<!DOCTYPE html>
<html>
<head>
<title>Orders</title>

<style>
body{text-align:center;font-family:Arial;background:#f5f5f5;}
.card{background:white;margin:15px auto;padding:15px;width:320px;box-shadow:0 0 10px gray;border-radius:10px;}
.status{font-weight:bold;}
</style>

</head>

<body>

<h2>📦 Your Orders</h2>

<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let output = "";

orders.forEach(order => {

output += `<div class="card">
<p><b>Date:</b> ${order.date}</p>
<p><b>Name:</b> ${order.address.name}</p>
<p><b>Phone:</b> ${order.address.phone}</p>
<p><b>Address:</b> ${order.address.address}, ${order.address.city} - ${order.address.pincode}</p>
<hr>`;

order.items.forEach(item => {
output += `<p>${item.name} x ${item.qty} - ₹${item.price}</p>`;
});

output += `
<hr>
<p><b>Total:</b> ₹${order.total}</p>
<p><b>Payment:</b> ${order.paymentMethod}</p>
<p class="status">Status: ${order.status}</p>
</div>`;
});

document.getElementById("orders").innerHTML = output;

</script>

</body>
</html>
