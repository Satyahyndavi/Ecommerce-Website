<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    margin: 0;
    font-family: Arial;
}
.container {
    display: flex;
    height: 100vh;
}
/* LEFT IMAGE */
.left {
    width: 50%;
}
.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
/* RIGHT FORM */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #ff7e5f, #feb47b);
}
.box {
    background: white;
    padding: 30px;
    width: 320px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px gray;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff7e5f;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="left">
<img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d">
</div>

<div class="right">
<div class="box">

<h2>🔐 Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>
<a href="register.html">New User?</a>

</div>
</div>

</div>

<script>
function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let user=JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Register first ❌");
return;
}

if(email===user.email && password===user.password){
localStorage.setItem("loggedIn","true");
window.location.href="index.html";
}else{
alert("Wrong credentials ❌");
}
}
</script>

</body>
</html>
