<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

h2{
  background:#ff7e5f;
  color:white;
  padding:15px;
}

.card{
  background:white;
  margin:15px auto;
  padding:15px;
  width:300px;
  box-shadow:0 0 10px gray;
  border-radius:10px;
}

img{
  width:100px;
  height:100px;
  object-fit:cover;
}

button{
  border:none;
  padding:6px 10px;
  margin:5px;
  border-radius:5px;
  cursor:pointer;
}

.qty-btn{
  background:#333;
  color:white;
}

remove-btn{
  background:red;
  color:white;
}

.checkout-btn{
  background:green;
  color:white;
  padding:10px 20px;
  font-size:16px;
}

</style>

<script>
// Login check
if(localStorage.getItem("loggedIn")!=="true"){
  alert("Login first ❌");
  window.location.href="login.html";
}
</script>

</head>

<body>

<h2>🛒 Your Cart</h2>

<div id="items"></div>
<h3 id="total"></h3>

<button class="checkout-btn" onclick="checkout()">Proceed to Payment 💳</button>

<script>

// Get cart data
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Ensure quantity exists
cart.forEach(item => {
  if(!item.qty){
    item.qty = 1;
  }
});

// Load cart
function loadCart(){
  let output = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += item.price * item.qty;

    output += `
    <div class="card">
      <img src="${item.image}">
      <h3>${item.name}</h3>
      <p>Price: ₹${item.price}</p>

      <div>
        <button class="qty-btn" onclick="decreaseQty(${i})">➖</button>
        <b>${item.qty}</b>
        <button class="qty-btn" onclick="increaseQty(${i})">➕</button>
      </div>

      <p>Subtotal: ₹${item.price * item.qty}</p>

      <button style="background:red;color:white;" onclick="removeItem(${i})">Remove ❌</button>
    </div>
    `;
  });

  document.getElementById("items").innerHTML = output;
  document.getElementById("total").innerText = "Total Amount: ₹" + total;

  localStorage.setItem("cart", JSON.stringify(cart));
}

// Increase quantity
function increaseQty(i){
  cart[i].qty++;
  loadCart();
}

// Decrease quantity
function decreaseQty(i){
  if(cart[i].qty > 1){
    cart[i].qty--;
  }
  loadCart();
}

// Remove item
function removeItem(i){
  cart.splice(i,1);
  loadCart();
}

// ✅ CHECKOUT → PAYMENT PAGE
function checkout(){
  if(cart.length > 0){
    window.location.href = "payment.html"; // 👈 KEY CHANGE
  } else {
    alert("Cart Empty ❌");
  }
}

// Initial load
loadCart();

</script>

</body>
</html>
